disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping

included:
  - StreamView

excluded:
  - Pods
  - Carthage
  - .build

line_length:
  warning: 120
  error: 150

identifier_name:
  min_length: 2
  max_length: 40
